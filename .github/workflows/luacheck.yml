name: check
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          path: sailing_kit
      - name: install luarocks
        run: sudo apt-get install luarocks
      - name: download luacheck
        uses: actions/checkout@master
        with:
          repository: lunarmodules/luacheck
          path: luacheck
      - name: build luacheck
        run: |
          cd luacheck
          sudo luarocks make
      - name: run luacheck
        run: |
          cd sailing_kit
          luacheck .
      - name: install stylua
        run: cargo install stylua
      - name: run stylua
        run: |
          cd sailing_kit
          stylua .
        
